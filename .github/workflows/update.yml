name: Update Manifest

on:
  repository_dispatch:
    types: [release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to update to (e.g., 1.0.0-rc.18)'
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          # Strip "v" prefix if present
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Updating to version: $VERSION"

      - name: Get checksums
        id: checksums
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          BASE="https://github.com/rustledger/rustledger/releases/download/v${VERSION}"

          # Read the authoritative .sha256 sidecar uploaded by release-build.yml.
          # The previous approach (`curl -sL <zip> | sha256sum`) silently hashed
          # GitHub's HTML 404 body when this workflow raced ahead of the binary
          # upload — see the v0.15.0 incident: 7-byte response → "0019dfc4..."
          # in the manifest, blocking `scoop install` for every Windows user.
          fetch_sha() {
            local target="$1"
            local url="${BASE}/rustledger-v${VERSION}-${target}.zip.sha256"
            for attempt in $(seq 1 30); do
              if SIDECAR=$(curl -fsSL "$url" 2>/dev/null); then
                # Sidecar format: "<hash>  <filename>"
                printf '%s' "$SIDECAR" | awk '{print $1}'
                return 0
              fi
              echo "Attempt ${attempt}/30: ${url} not yet available, waiting 20s..." >&2
              sleep 20
            done
            echo "::error::Timed out waiting for ${url} after 10 minutes" >&2
            return 1
          }

          HASH_X64=$(fetch_sha "x86_64-pc-windows-msvc")
          HASH_ARM64=$(fetch_sha "aarch64-pc-windows-msvc")

          # Sanity check: a sha256 is 64 hex chars.
          for h in "$HASH_X64" "$HASH_ARM64"; do
            if ! echo "$h" | grep -qE '^[0-9a-f]{64}$'; then
              echo "::error::Invalid hash extracted: '$h'"
              exit 1
            fi
          done

          echo "hash_x64=$HASH_X64" >> $GITHUB_OUTPUT
          echo "hash_arm64=$HASH_ARM64" >> $GITHUB_OUTPUT

      - name: Update manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          HASH_X64="${{ steps.checksums.outputs.hash_x64 }}"
          HASH_ARM64="${{ steps.checksums.outputs.hash_arm64 }}"

          cat > bucket/rustledger.json << EOF
          {
              "version": "${VERSION}",
              "description": "Fast, pure Rust implementation of Beancount double-entry accounting",
              "homepage": "https://rustledger.github.io",
              "license": "GPL-3.0-only",
              "architecture": {
                  "64bit": {
                      "url": "https://github.com/rustledger/rustledger/releases/download/v${VERSION}/rustledger-v${VERSION}-x86_64-pc-windows-msvc.zip",
                      "hash": "${HASH_X64}"
                  },
                  "arm64": {
                      "url": "https://github.com/rustledger/rustledger/releases/download/v${VERSION}/rustledger-v${VERSION}-aarch64-pc-windows-msvc.zip",
                      "hash": "${HASH_ARM64}"
                  }
              },
              "bin": [
                  "rledger.exe",
                  "rledger-lsp.exe"
              ],
              "checkver": "github",
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://github.com/rustledger/rustledger/releases/download/v\$version/rustledger-v\$version-x86_64-pc-windows-msvc.zip"
                      },
                      "arm64": {
                          "url": "https://github.com/rustledger/rustledger/releases/download/v\$version/rustledger-v\$version-aarch64-pc-windows-msvc.zip"
                      }
                  }
              }
          }
          EOF

      - name: Commit and push
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/rustledger.json
          git commit -m "Update rustledger to ${VERSION}" || exit 0
          git push
